<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Land Registry DApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Blockchain Property Ledger</p>
      <h1>Land Registry</h1>
      <p class="subtitle">Built with Solidity + Truffle + Ganache</p>
      <button id="connectWalletBtn" class="btn btn-primary">Connect Wallet</button>
      <p id="walletInfo" class="wallet">Wallet: Not Connected</p>
      <p id="networkInfo" class="wallet">Network: Unknown</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Register Land</h2>
        <form id="registerForm">
          <label for="landId">Land ID</label>
          <input id="landId" type="number" min="1" required />

          <label for="landLocation">Location</label>
          <input id="landLocation" type="text" required />

          <label for="landArea">Area (sq ft)</label>
          <input id="landArea" type="number" min="1" required />

          <button type="submit" class="btn">Register</button>
        </form>
      </article>

      <article class="card">
        <h2>Transfer Ownership</h2>
        <form id="transferForm">
          <label for="transferLandId">Land ID</label>
          <input id="transferLandId" type="number" min="1" required />

          <label for="newOwner">New Owner Address</label>
          <input id="newOwner" type="text" placeholder="0x..." required />

          <button type="submit" class="btn">Transfer</button>
        </form>
      </article>

      <article class="card">
        <h2>Verify Ownership</h2>
        <form id="verifyForm">
          <label for="verifyLandId">Land ID</label>
          <input id="verifyLandId" type="number" min="1" required />

          <label for="claimant">Claimant Address</label>
          <input id="claimant" type="text" placeholder="0x..." required />

          <button type="submit" class="btn">Verify</button>
        </form>
        <p id="verifyResult" class="result"></p>
      </article>

      <article class="card">
        <h2>Fetch Land Details</h2>
        <form id="fetchLandForm">
          <label for="fetchLandId">Land ID</label>
          <input id="fetchLandId" type="number" min="1" required />

          <button type="submit" class="btn">Fetch</button>
        </form>
        <pre id="landDetails" class="code-block">No data loaded yet.</pre>
      </article>
    </section>

    <section class="table-card">
      <div class="table-head">
        <h2>Registered Lands</h2>
        <button id="refreshLandsBtn" class="btn btn-secondary">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Location</th>
              <th>Area (sq ft)</th>
              <th>Owner</th>
            </tr>
          </thead>
          <tbody id="landTableBody">
            <tr><td colspan="4">No records yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="statusBar" class="status">Ready.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
